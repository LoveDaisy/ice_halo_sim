<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, minimum-scale=1.0, initial-scale=1, user-scalable=yes" />
    <style>
      html {
        font-family: BlinkMacSystemFont,-apple-system,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,"Fira Sans","Droid Sans","Helvetica Neue",Helvetica,Arial,sans-serif;
        -webkit-font-smoothing: antialiased;
        background-color: #fff;
        font-size: 16px;
      }
      body {
        color: #4a4a4a;
        margin: 8px;
        font-size: 1em;
        font-weight: 400;
      }
      header {
        margin-bottom: 8px;
        display: flex;
        flex-direction: column;
      }
      main {
        width: 100%;
        display: flex;
        flex-direction: column;
      }
      a {
        color: #3273dc;
        cursor: pointer;
        text-decoration: none;
      }
      a:hover {
        color: #000;
      }
      button {
        color: #fff;
        background-color: #3298dc;
        border-color: transparent;
        cursor: pointer;
        text-align: center;
      }
      button:hover {
        background-color: #2793da;
        flex: none;
      }
      .spacer {
        flex: auto;
      }
      .small {
        font-size: 0.75rem;
      }
      footer {
        margin-top: 16px;
        display: flex;
        align-items: center;
      }
      .header-label {
        margin-right: 4px;
      }
      .benchmark-set {
        margin: 8px 0;
        width: 100%;
        display: flex;
        flex-direction: column;
      }
      .benchmark-title {
        font-size: 3rem;
        font-weight: 600;
        word-break: break-word;
        text-align: center;
      }
      .benchmark-graphs {
        display: flex;
        flex-direction: row;
        justify-content: space-around;
        align-items: center;
        flex-wrap: wrap;
        width: 100%;
      }
      .benchmark-chart {
        max-width: 1000px;
      }
    </style>
    <title>Benchmarks</title>
  </head>

  <body>
    <header id="header">
      <div class="header-item">
        <strong class="header-label">Last Update:</strong>
        <span id="last-update"></span>
      </div>
      <div class="header-item">
        <strong class="header-label">Repository:</strong>
        <a id="repository-link" rel="noopener"></a>
      </div>
    </header>
    <main id="main"></main>
    <footer>
      <button id="dl-button">Download data as JSON</button>
      <div class="spacer"></div>
      <div class="small">Powered by <a rel="noopener" href="https://github.com/marketplace/actions/continuous-benchmark">github-action-benchmark</a></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.2/dist/Chart.min.js"></script>
    <script src="data.js"></script>
    <script id="main-script">
      'use strict';
      (function() {
        // Distinct colors for platforms
        const platformColors = [
          '#e6194b', // red
          '#3cb44b', // green
          '#4363d8', // blue
          '#f58231', // orange
          '#911eb4', // purple
          '#42d4f4', // cyan
          '#f032e6', // magenta
          '#469990', // teal
        ];

        function init() {
          function collectBenchesPerTestCase(entries) {
            const map = new Map();
            for (const entry of entries) {
              const {commit, date, tool, benches} = entry;
              for (const bench of benches) {
                const result = { commit, date, tool, bench };
                const arr = map.get(bench.name);
                if (arr === undefined) {
                  map.set(bench.name, [result]);
                } else {
                  arr.push(result);
                }
              }
            }
            return map;
          }

          const data = window.BENCHMARK_DATA;

          // Render header
          document.getElementById('last-update').textContent = new Date(data.lastUpdate).toString();
          const repoLink = document.getElementById('repository-link');
          repoLink.href = data.repoUrl;
          repoLink.textContent = data.repoUrl;

          // Render footer
          document.getElementById('dl-button').onclick = () => {
            const dataUrl = 'data:,' + JSON.stringify(data, null, 2);
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = 'benchmark_data.json';
            a.click();
          };

          // Prepare data points for charts
          return Object.keys(data.entries).map(name => ({
            name,
            dataSet: collectBenchesPerTestCase(data.entries[name]),
          }));
        }

        function renderAllChars(dataSets) {

          function renderCombinedGraph(parent, suiteName, benchSet) {
            const canvas = document.createElement('canvas');
            canvas.className = 'benchmark-chart';
            parent.appendChild(canvas);

            // Collect all unique commit ids across all platforms (in order)
            const commitMap = new Map();
            for (const [, benches] of benchSet.entries()) {
              for (const b of benches) {
                const id = b.commit.id;
                if (!commitMap.has(id)) {
                  commitMap.set(id, b);
                }
              }
            }
            const commitIds = Array.from(commitMap.keys());
            const labels = commitIds.map(id => id.slice(0, 7));

            // Build one dataset (line) per platform
            const datasets = [];
            let colorIdx = 0;
            for (const [platformName, benches] of benchSet.entries()) {
              const color = platformColors[colorIdx % platformColors.length];
              colorIdx++;
              // Map commit id → bench data for this platform
              const byCommit = new Map();
              for (const b of benches) {
                byCommit.set(b.commit.id, b);
              }
              datasets.push({
                label: platformName,
                data: commitIds.map(id => {
                  const b = byCommit.get(id);
                  return b ? b.bench.value : null;
                }),
                borderColor: color,
                backgroundColor: color + '40',
                fill: false,
                spanGaps: true,
                // Store raw data for tooltips
                _rawData: commitIds.map(id => byCommit.get(id) || null),
              });
            }

            // Determine Y-axis unit from first available data point
            let unit = '';
            for (const [, benches] of benchSet.entries()) {
              if (benches.length > 0) {
                unit = benches[0].bench.unit;
                break;
              }
            }

            // Scale throughput charts: raw rays/sec → ×10³ rays/sec
            const isThroughput = suiteName.toLowerCase().includes('throughput');
            const scaleFactor = isThroughput ? 1000 : 1;
            if (isThroughput) {
              unit = '×10³ rays/sec';
              for (const ds of datasets) {
                ds.data = ds.data.map(v => v != null ? v / scaleFactor : null);
              }
            }

            const options = {
              scales: {
                xAxes: [{
                  scaleLabel: { display: true, labelString: 'commit' },
                }],
                yAxes: [{
                  scaleLabel: { display: true, labelString: unit },
                  ticks: { beginAtZero: true },
                }],
              },
              tooltips: {
                mode: 'index',
                intersect: false,
                callbacks: {
                  afterTitle: items => {
                    const {index} = items[0];
                    const entry = commitMap.get(commitIds[index]);
                    if (!entry) return '';
                    return '\n' + entry.commit.message.split('\n')[0] + '\n' + entry.commit.timestamp + '\n';
                  },
                  label: item => {
                    const ds = datasets[item.datasetIndex];
                    const raw = ds._rawData[item.index];
                    if (!raw) return ds.label + ': N/A';
                    const displayUnit = isThroughput ? unit : raw.bench.unit;
                    const displayValue = isThroughput ? parseFloat(item.value).toFixed(1) : item.value;
                    let label = ds.label + ': ' + displayValue + ' ' + displayUnit;
                    if (raw.bench.range) label += ' (' + raw.bench.range + ')';
                    return label;
                  },
                  afterBody: items => {
                    const raw = datasets[items[0].datasetIndex]._rawData[items[0].index];
                    if (raw && raw.bench.extra) return '\n' + raw.bench.extra;
                    return '';
                  },
                },
              },
              onClick: (_mouseEvent, activeElems) => {
                if (activeElems.length === 0) return;
                const index = activeElems[0]._index;
                const entry = commitMap.get(commitIds[index]);
                if (entry) window.open(entry.commit.url, '_blank');
              },
              legend: {
                display: true,
                position: 'top',
              },
            };

            new Chart(canvas, {
              type: 'line',
              data: { labels, datasets },
              options,
            });
          }

          function renderBenchSet(name, benchSet, main) {
            const setElem = document.createElement('div');
            setElem.className = 'benchmark-set';
            main.appendChild(setElem);

            const nameElem = document.createElement('h1');
            nameElem.className = 'benchmark-title';
            nameElem.textContent = name;
            setElem.appendChild(nameElem);

            const graphsElem = document.createElement('div');
            graphsElem.className = 'benchmark-graphs';
            setElem.appendChild(graphsElem);

            renderCombinedGraph(graphsElem, name, benchSet);
          }

          const main = document.getElementById('main');
          for (const {name, dataSet} of dataSets) {
            renderBenchSet(name, dataSet, main);
          }
        }

        renderAllChars(init()); // Start
      })();
    </script>
  </body>
</html>
