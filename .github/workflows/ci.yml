name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_cache

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu x86_64
            os: ubuntu-24.04
            build_gui: ON
            cache_key: ubuntu-x64

          - name: Ubuntu ARM64
            os: ubuntu-24.04-arm
            build_gui: OFF
            cache_key: ubuntu-arm64

          - name: macOS ARM64
            os: macos-15
            build_gui: ON
            cache_key: macos-arm64

          - name: Windows x86_64
            os: windows-2025
            build_gui: ON
            cache_key: windows-x64

          - name: Windows MSVC x86_64
            os: windows-2025
            build_gui: ON
            cache_key: windows-msvc-x64
            msvc: true

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: ${{ matrix.build_gui == 'ON' }}  # GUI builds need LFS for icon resources

      # MSVC: set up Visual Studio environment before configure/build
      - name: Set up MSVC
        if: matrix.msvc
        uses: ilammy/msvc-dev-cmd@v1

      # GLAD2 runs the Python code generator at CMake configure time (needs Jinja2).
      # Set Python_ROOT_DIR so CMake's find_package(Python) uses the same Python.
      - name: Install GLAD2 Python dependencies
        if: runner.os == 'Windows' && matrix.build_gui == 'ON' && !matrix.msvc
        shell: bash
        run: |
          python -m pip install jinja2
          echo "Python_ROOT_DIR=$(cygpath -w "$(dirname "$(which python)")")" >> "$GITHUB_ENV"
          echo "LUMICE_PYTHON_ARGS=-DPython_EXECUTABLE=$(cygpath -w "$(which python)")" >> "$GITHUB_ENV"

      - name: Install GLAD2 Python dependencies (MSVC)
        if: matrix.msvc && matrix.build_gui == 'ON'
        run: |
          python -m pip install jinja2

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux' && matrix.build_gui == 'ON'
        run: >
          sudo apt-get update && sudo apt-get install -y
          libgl-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev
          libgtk-3-dev

      - name: Cache CPM dependencies
        uses: actions/cache@v5
        with:
          path: cpm_cache
          key: cpm-${{ matrix.cache_key }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cpm-${{ matrix.cache_key }}-

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TEST=ON
          -DBUILD_GUI=${{ matrix.build_gui }}
          -DLUMICE_NATIVE_ARCH=OFF
          ${{ !matrix.msvc && env.LUMICE_PYTHON_ARGS || '' }}

      - name: Build
        run: cmake --build build --parallel

      - name: Verify Windows exe has no MinGW runtime dependencies
        if: runner.os == 'Windows' && !matrix.msvc
        shell: bash
        run: |
          echo "=== DLL imports for Lumice.exe ==="
          objdump -p build/src/Lumice.exe | grep "DLL Name" || true
          if objdump -p build/src/Lumice.exe | grep -qi "libgcc\|libstdc++\|libwinpthread"; then
            echo "ERROR: MinGW runtime DLLs found in imports!"
            exit 1
          fi
          echo "OK: no MinGW runtime DLLs"
          if [ "${{ matrix.build_gui }}" = "ON" ]; then
            echo "=== DLL imports for LumiceGUI.exe ==="
            objdump -p build/src/gui/LumiceGUI.exe | grep "DLL Name" || true
            if objdump -p build/src/gui/LumiceGUI.exe | grep -qi "libgcc\|libstdc++\|libwinpthread"; then
              echo "ERROR: MinGW runtime DLLs found in imports!"
              exit 1
            fi
            echo "OK: no MinGW runtime DLLs"
          fi

      - name: Test
        run: ctest --test-dir build --output-on-failure -R LumiceUnitTest

      - name: Upload GUI test binary (MinGW)
        if: matrix.os == 'windows-2025' && matrix.build_gui == 'ON' && !matrix.msvc
        uses: actions/upload-artifact@v4
        with:
          name: LumiceGUITests-windows
          path: |
            build/Release/bin/LumiceGUITests.exe
            build/Release/bin/LumiceGUI.exe
            build/Release/bin/Lumice.exe
            build/Release/lib/lumice.lib
          retention-days: 7

      - name: Upload GUI test binary (MSVC)
        if: matrix.msvc && matrix.build_gui == 'ON'
        uses: actions/upload-artifact@v4
        with:
          name: LumiceGUITests-windows-msvc
          path: |
            build/Release/bin/LumiceGUITests.exe
            build/Release/bin/LumiceGUI.exe
            build/Release/bin/Lumice.exe
          retention-days: 7

  e2e-test:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true  # E2E reference images are stored in LFS

      - name: Cache CPM dependencies
        uses: actions/cache@v5
        with:
          path: cpm_cache
          key: cpm-ubuntu-x64-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cpm-ubuntu-x64-

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/build/cmake_install
          -DBUILD_TEST=OFF
          -DBUILD_GUI=OFF
          -DLUMICE_NATIVE_ARCH=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install Pillow pytest

      - name: Run E2E tests
        run: pytest test/e2e/ -v
        timeout-minutes: 10

  format-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Check clang-format
        run: |
          find src test bench -name '*.cpp' -o -name '*.hpp' -o -name '*.h' -o -name '*.cc' -o -name '*.inl' | \
            xargs clang-format --dry-run --Werror 2>&1
