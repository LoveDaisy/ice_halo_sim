name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_cache

jobs:
  # Build + unit tests run on every push (all branches).
  # E2E tests run separately on pull_request and push to main (see e2e-test job).
  build:
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu x86_64
            os: ubuntu-24.04
            build_gui: ON
            cache_key: ubuntu-x64
            benchmark_bin: build/Release/bin/Lumice

          - name: Ubuntu ARM64
            os: ubuntu-24.04-arm
            build_gui: OFF
            cache_key: ubuntu-arm64
            benchmark_bin: build/Release/bin/Lumice

          - name: macOS ARM64
            os: macos-15
            build_gui: ON
            cache_key: macos-arm64
            benchmark_bin: build/Release/bin/Lumice

          - name: Windows MSVC x86_64
            os: windows-2025
            build_gui: ON
            cache_key: windows-msvc-x64
            msvc: true
            benchmark_bin: build/Release/bin/Lumice.exe

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v6

      # GUI builds need icon resources from LFS, but NOT test reference images.
      # Selective fetch saves ~16MB bandwidth per run vs `lfs: true`.
      - name: Fetch LFS icon resources
        if: matrix.build_gui == 'ON'
        run: git lfs pull --include="resources/*"

      # MSVC: set up Visual Studio environment before configure/build
      - name: Set up MSVC
        if: matrix.msvc
        uses: ilammy/msvc-dev-cmd@v1

      # GLAD2 runs the Python code generator at CMake configure time (needs Jinja2).
      - name: Install GLAD2 Python dependencies (MSVC)
        if: matrix.msvc && matrix.build_gui == 'ON'
        shell: pwsh
        run: |
          python -m pip install jinja2
          $pythonDir = Split-Path (Get-Command python).Source
          echo "LUMICE_PYTHON_ARGS=-DPython_EXECUTABLE=$(Get-Command python | Select-Object -ExpandProperty Source)" >> $env:GITHUB_ENV

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux' && matrix.build_gui == 'ON'
        run: >
          sudo apt-get update && sudo apt-get install -y
          libgl-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev
          libgtk-3-dev

      - name: Cache CPM dependencies
        uses: actions/cache@v5
        with:
          path: cpm_cache
          key: cpm-${{ matrix.cache_key }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cpm-${{ matrix.cache_key }}-

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TEST=ON
          -DBUILD_GUI=${{ matrix.build_gui }}
          -DLUMICE_NATIVE_ARCH=OFF
          ${{ env.LUMICE_PYTHON_ARGS }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -R LumiceUnitTest

      - name: Benchmark
        continue-on-error: true
        timeout-minutes: 5
        shell: bash
        run: |
          # Collect CPU model for reference
          CPU_MODEL=""
          case "$(uname -s)" in
            Linux)  CPU_MODEL=$(lscpu | grep "Model name" | sed 's/.*: *//' | head -1) || true ;;
            Darwin) CPU_MODEL=$(sysctl -n machdep.cpu.brand_string) || true ;;
            *)      CPU_MODEL=$(powershell.exe -NoProfile -Command "(Get-CimInstance Win32_Processor).Name" | tr -d '\r') || true ;;
          esac

          # Run dual-mode benchmark (outputs two [BENCHMARK] JSON lines)
          EXIT_CODE=0
          ${{ matrix.benchmark_bin }} --benchmark -f examples/bench_config.json -o /tmp > benchmark_stdout.txt 2>&1 || EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo '{"error": "exit_code='"$EXIT_CODE"'"}' > benchmark-result.txt
          else
            # Extract both benchmark lines, inject platform and cpu_model into each
            grep '\[BENCHMARK\]' benchmark_stdout.txt | sed 's/^\[BENCHMARK\] //' | \
              jq --arg p "${{ matrix.name }}" --arg cpu "${CPU_MODEL:-unknown}" \
                 '. + {platform: $p, cpu_model: $cpu}' \
              > benchmark-result.txt
          fi
          cat benchmark-result.txt

      - name: Upload benchmark result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-${{ matrix.cache_key }}
          path: benchmark-result.txt
          retention-days: 30

      - name: Upload GUI test binary (MSVC)
        if: matrix.msvc && matrix.build_gui == 'ON'
        uses: actions/upload-artifact@v7
        with:
          name: LumiceGUITests-windows-msvc
          path: |
            build/Release/bin/LumiceGUITests.exe
            build/Release/bin/LumiceGUI.exe
            build/Release/bin/Lumice.exe
          retention-days: 7

  e2e-test:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true  # E2E reference images are stored in LFS

      - name: Cache CPM dependencies
        uses: actions/cache@v5
        with:
          path: cpm_cache
          key: cpm-ubuntu-x64-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cpm-ubuntu-x64-

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/build/cmake_install
          -DBUILD_TEST=OFF
          -DBUILD_GUI=OFF
          -DLUMICE_NATIVE_ARCH=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install Pillow pytest

      - name: Run E2E tests
        run: pytest test/e2e/ -v
        timeout-minutes: 10

  benchmark-summary:
    if: always() && github.event_name == 'push'
    needs: [build]
    runs-on: ubuntu-24.04
    steps:
      - name: Download benchmark artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: benchmark-*
          path: benchmarks

      - name: Generate summary
        run: |
          FMT_NUM() { echo "$1" | rev | sed 's/[0-9]\{3\}/&,/g' | rev | sed 's/^,//'; }

          echo "## CLI Benchmark Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | CPU | Cores | Workers | Single rps | Multi rps | Efficiency | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-----|-------|---------|------------|-----------|------------|--------|" >> "$GITHUB_STEP_SUMMARY"

          for f in benchmarks/benchmark-*/benchmark-result.txt; do
            if [ ! -f "$f" ]; then
              continue
            fi

            # Check for error (first line)
            FIRST_LINE=$(head -1 "$f")
            if echo "$FIRST_LINE" | jq -e '.error' > /dev/null 2>&1; then
              ERROR=$(echo "$FIRST_LINE" | jq -r '.error')
              echo "| (unknown) | - | - | - | - | - | - | CRASHED ($ERROR) |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            # Parse single and multi mode lines
            SINGLE_LINE=$(jq -c 'select(.mode == "single")' "$f" 2>/dev/null | head -1)
            MULTI_LINE=$(jq -c 'select(.mode == "multi")' "$f" 2>/dev/null | head -1)

            if [ -z "$SINGLE_LINE" ] && [ -z "$MULTI_LINE" ]; then
              echo "| (unknown) | - | - | - | - | - | - | N/A (parse error) |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            # Extract fields from whichever line is available
            REF_LINE="${MULTI_LINE:-$SINGLE_LINE}"
            PLATFORM=$(echo "$REF_LINE" | jq -r '.platform // "unknown"')
            CPU_MODEL=$(echo "$REF_LINE" | jq -r '.cpu_model // "-"' | cut -c1-35)
            CORES=$(echo "$REF_LINE" | jq -r '.cores // "-"')
            WORKERS=$(echo "$REF_LINE" | jq -r '.workers // "-"')

            SINGLE_RPS="-" ; MULTI_RPS="-" ; EFFICIENCY="-"
            if [ -n "$SINGLE_LINE" ]; then
              S_RPS=$(echo "$SINGLE_LINE" | jq -r '.rays_per_sec')
              SINGLE_RPS=$(FMT_NUM "$(printf '%.0f' "$S_RPS")")
            fi
            if [ -n "$MULTI_LINE" ]; then
              M_RPS=$(echo "$MULTI_LINE" | jq -r '.rays_per_sec')
              MULTI_RPS=$(FMT_NUM "$(printf '%.0f' "$M_RPS")")
            fi

            # Compute parallel efficiency: multi_rps / (single_rps × workers)
            if [ -n "$SINGLE_LINE" ] && [ -n "$MULTI_LINE" ]; then
              EFFICIENCY=$(awk "BEGIN {
                w = $(echo "$MULTI_LINE" | jq -r '.workers');
                if (w > 0 && $S_RPS > 0) printf \"%.0f%%\", ($M_RPS / ($S_RPS * w)) * 100;
                else print \"N/A\"
              }")
            fi

            echo "| $PLATFORM | $CPU_MODEL | $CORES | $WORKERS | $SINGLE_RPS | $MULTI_RPS | $EFFICIENCY | OK |" >> "$GITHUB_STEP_SUMMARY"
          done

  format-check:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Check clang-format
        run: |
          find src test bench -name '*.cpp' -o -name '*.hpp' -o -name '*.h' -o -name '*.cc' -o -name '*.inl' | \
            xargs clang-format --dry-run --Werror 2>&1
