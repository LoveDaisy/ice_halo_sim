name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_cache

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu x86_64
            os: ubuntu-24.04
            build_gui: OFF
            cache_key: ubuntu-x64

          - name: Ubuntu ARM64
            os: ubuntu-24.04-arm
            build_gui: OFF
            cache_key: ubuntu-arm64

          - name: macOS ARM64
            os: macos-15
            build_gui: ON
            cache_key: macos-arm64

          - name: Windows x86_64
            os: windows-2025
            build_gui: OFF
            cache_key: windows-x64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache CPM dependencies
        uses: actions/cache@v4
        with:
          path: cpm_cache
          key: cpm-${{ matrix.cache_key }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cpm-${{ matrix.cache_key }}-

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TEST=ON
          -DBUILD_GUI=${{ matrix.build_gui }}
          -DLUMICE_NATIVE_ARCH=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -R LumiceUnitTest

  e2e-test:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Cache CPM dependencies
        uses: actions/cache@v4
        with:
          path: cpm_cache
          key: cpm-ubuntu-x64-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cpm-ubuntu-x64-

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TEST=OFF
          -DBUILD_GUI=OFF
          -DLUMICE_NATIVE_ARCH=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build --prefix build/cmake_install

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install Pillow pytest

      - name: Run E2E tests
        run: pytest test/e2e/ -v
        timeout-minutes: 10

  format-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check clang-format
        run: |
          find src test bench -name '*.cpp' -o -name '*.hpp' -o -name '*.h' -o -name '*.cc' -o -name '*.inl' | \
            xargs clang-format --dry-run --Werror 2>&1
