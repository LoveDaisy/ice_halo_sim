name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_cache

jobs:
  # Build + unit tests run on every push (all branches).
  # E2E tests run separately on pull_request and push to main (see e2e-test job).
  build:
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu x86_64
            os: ubuntu-24.04
            build_gui: ON
            cache_key: ubuntu-x64
            benchmark_bin: build/Release/bin/Lumice

          - name: Ubuntu ARM64
            os: ubuntu-24.04-arm
            build_gui: OFF
            cache_key: ubuntu-arm64
            benchmark_bin: build/Release/bin/Lumice

          - name: macOS ARM64
            os: macos-15
            build_gui: ON
            cache_key: macos-arm64
            benchmark_bin: build/Release/bin/Lumice

          - name: Windows MSVC x86_64
            os: windows-2025
            build_gui: ON
            cache_key: windows-msvc-x64
            msvc: true
            benchmark_bin: build/Release/bin/Lumice.exe

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v7

      # GUI builds need icon resources from LFS, but NOT test reference images.
      # Selective fetch saves ~16MB bandwidth per run vs `lfs: true`.
      - name: Fetch LFS icon resources
        if: matrix.build_gui == 'ON'
        run: git lfs pull --include="resources/*"

      # MSVC: set up Visual Studio environment before configure/build
      - name: Set up MSVC
        if: matrix.msvc
        uses: ilammy/msvc-dev-cmd@v1

      # GLAD2 runs the Python code generator at CMake configure time (needs Jinja2).
      - name: Install GLAD2 Python dependencies (MSVC)
        if: matrix.msvc && matrix.build_gui == 'ON'
        shell: pwsh
        run: |
          python -m pip install jinja2
          $pythonDir = Split-Path (Get-Command python).Source
          echo "LUMICE_PYTHON_ARGS=-DPython_EXECUTABLE=$(Get-Command python | Select-Object -ExpandProperty Source)" >> $env:GITHUB_ENV

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux' && matrix.build_gui == 'ON'
        run: >
          sudo apt-get update && sudo apt-get install -y
          libgl-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev
          libgtk-3-dev

      - name: Cache CPM dependencies
        uses: actions/cache@v6
        with:
          path: cpm_cache
          key: cpm-${{ matrix.cache_key }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cpm-${{ matrix.cache_key }}-

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TEST=ON
          -DBUILD_GUI=${{ matrix.build_gui }}
          -DLUMICE_NATIVE_ARCH=OFF
          ${{ env.LUMICE_PYTHON_ARGS }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -L "unit-correctness|parity|golden-analytic"

      - name: Benchmark
        continue-on-error: true
        timeout-minutes: 5
        shell: bash
        run: |
          # Collect CPU model for reference
          CPU_MODEL=""
          case "$(uname -s)" in
            Linux)  CPU_MODEL=$(lscpu | grep "Model name" | sed 's/.*: *//' | head -1) || true ;;
            Darwin) CPU_MODEL=$(sysctl -n machdep.cpu.brand_string) || true ;;
            *)      CPU_MODEL=$(powershell.exe -NoProfile -Command "(Get-CimInstance Win32_Processor).Name" | tr -d '\r') || true ;;
          esac

          # Run dual-mode benchmark (outputs two [BENCHMARK] JSON lines)
          EXIT_CODE=0
          ${{ matrix.benchmark_bin }} --benchmark -f examples/bench_config.json -o /tmp > benchmark_stdout.txt 2>&1 || EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo '{"error": "exit_code='"$EXIT_CODE"'"}' > benchmark-result.txt
          else
            # Extract both benchmark lines, inject platform and cpu_model into each
            grep '\[BENCHMARK\]' benchmark_stdout.txt | sed 's/^\[BENCHMARK\] //' | \
              jq --arg p "${{ matrix.name }}" --arg cpu "${CPU_MODEL:-unknown}" \
                 '. + {platform: $p, cpu_model: $cpu}' \
              > benchmark-result.txt
          fi
          cat benchmark-result.txt

      - name: Upload benchmark result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-${{ matrix.cache_key }}
          path: benchmark-result.txt
          retention-days: 30

      - name: Upload GUI test binary (MSVC)
        if: matrix.msvc && matrix.build_gui == 'ON'
        uses: actions/upload-artifact@v7
        with:
          name: gui-test-windows-msvc
          path: |
            build/Release/bin/gui_test.exe
            build/Release/bin/LumiceGUI.exe
            build/Release/bin/Lumice.exe
          retention-days: 7

  # CUDA compile-only: nvcc actually compiles the .cu translation units on every
  # push/PR. No GPU is required (nvcc emits PTX/object from CPU). Runtime and
  # parity validation still need a GPU runner (dev49) and are intentionally
  # out of scope here — see issue.md AC6: this job must not be read as
  # "CUDA all green". The job exists to catch nvcc-only compile/syntax bugs
  # (e.g. -Werror=switch breaking nvcc, scrum-295 commit 9b9cdacd) without
  # waiting for the rsync→docker→dev49 loop.
  #
  # PTX floor = compute_61 (Pascal/2016+); driver JIT-compiles to native sm on
  # any GPU >= sm_61. Matches CMakeLists.txt CMAKE_CUDA_ARCHITECTURES default.
  cuda-compile:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      # Install only the compiler + cudart dev headers/stubs (~400 MB) rather
      # than the full ~2 GB toolkit. This is enough for nvcc to compile .cu
      # files and for CMake's find_package(CUDAToolkit) / CUDA::cudart link
      # target to resolve. Pinned to CUDA 12.6 (a recent stable release that
      # still supports compute_61 PTX); if 12-6 packages drift, bump to a
      # nearby 12.x or switch to Jimver/cuda-toolkit action.
      - name: Install CUDA toolkit (nvcc + cudart)
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb \
            -O cuda-keyring.deb
          sudo dpkg -i cuda-keyring.deb
          sudo apt-get update -qq
          sudo apt-get install -y cuda-nvcc-12-6 cuda-cudart-dev-12-6
          echo "/usr/local/cuda/bin" >> $GITHUB_PATH

      # Share the CPM cache with the Ubuntu x64 build job: same OS, same
      # CMakeLists.txt hash → same dependency set. The CUDA-enabled configure
      # does not pull in new CPM packages (CUDA toolkit is system-installed
      # above, not via CPM), so cache hit rate is preserved.
      - name: Cache CPM dependencies
        uses: actions/cache@v6
        with:
          path: cpm_cache
          key: cpm-ubuntu-x64-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cpm-ubuntu-x64-

      # BUILD_GUI=OFF avoids OpenGL/X11 deps; BUILD_TEST=OFF skips test
      # targets (no .cu files live under test/, so coverage is complete).
      # LUMICE_NATIVE_ARCH=OFF matches the rest of CI.
      - name: Configure (CUDA compile-only)
        env:
          CUDA_PATH: /usr/local/cuda
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TEST=OFF
          -DBUILD_GUI=OFF
          -DLUMICE_CUDA_ENABLED=ON
          -DLUMICE_NATIVE_ARCH=OFF

      # Builds the Lumice CLI; this drives nvcc through cuda_trace_backend.cu
      # and links CUDA::cudart, exercising both compile and link paths.
      - name: Build (compiles cuda_trace_backend.cu)
        run: cmake --build build --parallel

  # Windows CUDA compile-only: nvcc + MSVC on windows-2022.
  #
  # Pin rationale (scrum-310 / task-win-cuda-ci-gate, 2026-07-01):
  #   - Runner: `windows-2022` (GitHub-hosted; CUDA Toolkit NOT preinstalled).
  #     We pin to windows-2022 ON PURPOSE — NOT the newer `windows-2025`. The
  #     `windows-2025` image has rolled its ONLY Visual Studio install forward
  #     to VS 2026 (MSVC 14.51, `_MSC_VER` 1951; `vswhere` finds only
  #     `...\Microsoft Visual Studio\18\Enterprise`, no VS 2022 fallback).
  #     Every current CUDA release rejects MSVC > VS 2022 (CUDA 12.6's
  #     `crt/host_config.h`: "Only the versions between 2017 and 2022 are
  #     supported"), so the CUDA job MUST run on an image that still ships a
  #     CUDA-compatible MSVC. windows-2022 ships VS 2022 (MSVC 14.4x). The
  #     non-CUDA `Windows MSVC x86_64` build job above stays on windows-2025
  #     (it compiles fine under VS 2026); only this CUDA job needs the older
  #     image. Verified first-hand in CI run 28439410508 (the windows-2025
  #     attempt that failed at Configure).
  #   - MSVC: windows-2022 runner default (VS 2022; `_MSC_VER` surfaced by the
  #     "Diagnose toolchain versions" step below — kept permanently so future
  #     image drift is debuggable from any run).
  #   - CUDA: 12.6.3 — latest 12.6 patch, matches the Linux `cuda-compile`
  #     job above (one CUDA major across all CI legs) and supports VS 2022.
  #     Do NOT use CUDA 11.x — its `_MSC_VER` ceiling (~1930) is below recent
  #     VS 2022 17.x (scrum-309 hit exactly this).
  #   - MAINTENANCE: when GitHub eventually retires windows-2022, either move
  #     to whatever hosted image still carries a CUDA-supported VS, or bump
  #     CUDA to a version that supports the then-current MSVC. Do NOT "fix" a
  #     future break by pinning a stale MSVC toolset onto windows-2025 — that
  #     image dropped VS 2022 entirely.
  #
  # Mirrors the ubuntu-24.04 `cuda-compile` job (compile-only, no GPU, no
  # runtime). Runtime/parity validation still requires a real CUDA GPU and
  # is covered by scrum-309 + the manual-release-artifact-verify task.
  #
  # This job is the merge gate for `feat/cuda-windows-validation` → main:
  # without it, the scrum-309 Windows-gated build fixes (spdlog/fmt/nvcc)
  # would have zero automated regression protection on main.
  #
  # No job-level `if:` — relies on the workflow-level `on: push / pull_request`
  # triggers so both PRs and branch pushes run this gate.
  windows-cuda-compile:
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      # Sets up the MSVC environment (cl.exe, link.exe, lib paths) for the
      # current shell. Must run BEFORE the CUDA toolkit step so nvcc sees a
      # host compiler.
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        # toolset: '14.39'  # Uncomment + pin if a future MSVC bump breaks the
        #                   # chosen CUDA version (scrum-309 used 14.39).

      # Diagnostics — kept permanently (not a throwaway spike). The host
      # compiler version determines which CUDA versions are usable; surfacing
      # `_MSC_VER` and `cl.exe` in every run means future "broke after image
      # update" failures are debuggable from the job log alone.
      - name: Diagnose toolchain versions
        shell: pwsh
        run: |
          Write-Host "=== MSVC environment ==="
          Write-Host "VCToolsVersion = $env:VCToolsVersion"
          Write-Host "VisualStudioVersion = $env:VisualStudioVersion"
          Write-Host "--- cl.exe banner ---"
          cl.exe 2>&1 | Select-Object -First 2
          Write-Host "--- _MSC_VER via test compile ---"
          # Emit _MSC_VER as a preprocessor token so it shows up verbatim in
          # the log even if cl.exe banner format changes across VS updates.
          'int main(){return _MSC_VER;}' | Set-Content -Path msc_probe.cpp
          cl.exe /nologo /EP /Zs msc_probe.cpp 2>&1 | Select-String 'return'
          Remove-Item msc_probe.cpp -ErrorAction SilentlyContinue

      # Install only nvcc + cudart dev headers/stubs (mirrors the Linux job's
      # precision install). `method: network` is appropriate for hosted runners
      # (fresh VM each run). `sub-packages` is Jimver/cuda-toolkit's documented
      # mechanism for partial installs — if the action ever changes that
      # contract, the install-size diagnostic step below will catch it.
      - name: Install CUDA toolkit (nvcc + cudart_dev)
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.6.3'
          method: 'network'
          sub-packages: '["nvcc", "cudart"]'

      # Verify sub-packages took effect (caught a full 4GB install rather than
      # the ~500MB nvcc+cudart subset). If this shows full-toolkit footprint,
      # the sub-packages contract changed and the install step needs revisit.
      - name: Diagnose CUDA install
        shell: pwsh
        run: |
          Write-Host "=== nvcc version ==="
          nvcc --version
          Write-Host "=== CUDA_PATH ==="
          Write-Host "CUDA_PATH = $env:CUDA_PATH"
          if ($env:CUDA_PATH) {
            Write-Host "--- toolkit footprint (top-level dirs) ---"
            Get-ChildItem $env:CUDA_PATH | Select-Object Name, Mode
          }

      # Independent cache key (not shared with the `windows-msvc-x64` build job
      # above) so an eventual divergence in CPM dependency sets between the
      # CUDA-enabled and CUDA-disabled configures cannot pollute either side.
      # Current CMakeLists.txt does not add CPM packages under
      # LUMICE_CUDA_ENABLED=ON, so this only costs one extra cache slot.
      - name: Cache CPM dependencies
        uses: actions/cache@v6
        with:
          path: cpm_cache
          key: cpm-windows-msvc-x64-cuda-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cpm-windows-msvc-x64-cuda-

      # BUILD_GUI=OFF + BUILD_TEST=OFF mirrors the Linux cuda-compile job:
      # no GLAD2/Python generator is invoked (that step is gated on
      # matrix.build_gui == 'ON' in the build job above), and no test
      # translation unit owns a .cu file so coverage is complete.
      # LUMICE_NATIVE_ARCH=OFF matches the rest of CI.
      - name: Configure (CUDA compile-only)
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TEST=OFF
          -DBUILD_GUI=OFF
          -DLUMICE_CUDA_ENABLED=ON
          -DLUMICE_NATIVE_ARCH=OFF

      # Build the Lumice CLI; this drives nvcc through cuda_trace_backend.cu
      # and links CUDA::cudart, exercising both compile and link paths under
      # MSVC. AC2 = this step's log must show nvcc invocation for the .cu TU.
      - name: Build (compiles cuda_trace_backend.cu via nvcc)
        run: cmake --build build --parallel

  # Bench compile-only: builds the `lumice_bench` target so BUILD_BENCH=ON cannot
  # rot again. It does NOT run the benchmarks — numbers off a shared, throttled
  # CI runner are noise, and running them would only add PR latency. Perf work
  # measures on the dedicated machines instead (doc/performance-testing.md).
  #
  # Why this job exists (2026-07-16): neither CI nor
  # the pre-commit hook passed -b / -DBUILD_BENCH=ON, so nothing ever compiled
  # bench/ and it silently rotted for months — e7c30933's RaySeg SBO refactor
  # left bench_filter.cpp referencing a member that no longer existed, and the
  # break surfaced only when someone tried -b by hand. Fixing the file without
  # adding this gate would just restart that clock.
  #
  # No job-level `if:` — relies on the workflow-level `on: push / pull_request`
  # triggers so both PRs and branch pushes run this gate.
  bench-compile:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      # Independent cache key: BUILD_BENCH=ON pulls in the google/benchmark CPM
      # package, so this configure's dependency set differs from the plain
      # ubuntu-x64 build job's. Sharing a key would let one pollute the other.
      - name: Cache CPM dependencies
        uses: actions/cache@v6
        with:
          path: cpm_cache
          key: cpm-ubuntu-x64-bench-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cpm-ubuntu-x64-bench-

      # BUILD_TEST=OFF + BUILD_GUI=OFF keep this job narrow: the build job above
      # already covers those targets, and skipping them avoids the OpenGL/X11
      # deps and the GLAD2 Python generator. LUMICE_NATIVE_ARCH=OFF matches the
      # rest of CI.
      - name: Configure (bench compile-only)
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TEST=OFF
          -DBUILD_GUI=OFF
          -DBUILD_BENCH=ON
          -DLUMICE_NATIVE_ARCH=OFF

      # Target-scoped on purpose: `lumice_bench` pulls in lumice_obj, so this
      # compiles every bench translation unit plus the core it links against,
      # without building the CLI/install artifacts the build job already covers.
      - name: Build lumice_bench (compile + link only, no run)
        run: cmake --build build --target lumice_bench --parallel

  e2e-test:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true  # E2E reference images are stored in LFS

      - name: Cache CPM dependencies
        uses: actions/cache@v6
        with:
          path: cpm_cache
          key: cpm-ubuntu-x64-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cpm-ubuntu-x64-

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/build/cmake_install
          -DBUILD_TEST=OFF
          -DBUILD_GUI=OFF
          -DLUMICE_NATIVE_ARCH=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        # numpy is imported at module top in several test modules and
        # test/e2e/capi_runner.py (BufferedSimResult dataclass), so pytest
        # collection needs it even when the slow tests themselves are skipped.
        run: pip install Pillow pytest numpy

      - name: Run E2E tests
        # `-m "not slow"` excludes shared-lib-based tests which require
        # BUILD_SHARED_LIBS=ON and a separate build flavor (see e2e-slow job).
        # Test paths come from pyproject.toml [tool.pytest.ini_options] testpaths.
        run: pytest -v -m "not slow"
        timeout-minutes: 10

  e2e-slow:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        # macOS runs the metal slow tests for real (Apple-only) and the suite is
        # heavy, so it is split into two parallel legs (separate runners → no
        # core contention) to keep each leg's wall-clock under the step timeout
        # without bumping it high enough to drag overall PR latency. Ubuntu skips
        # all metal tests (Darwin guard) so it stays a single fast leg.
        include:
          - name: Ubuntu x86_64
            os: ubuntu-24.04
            cache_key: ubuntu-x64
            pytest_args: "test/e2e-correctness test/parity-cross-backend test/performance test/gui test/regression-sentinel"

          - name: macOS ARM64 parity
            os: macos-15
            cache_key: macos-arm64
            pytest_args: test/parity-cross-backend/backend/test_metal_exit_seam_parity.py

          - name: macOS ARM64 rest
            os: macos-15
            cache_key: macos-arm64
            pytest_args: "test/e2e-correctness test/parity-cross-backend test/performance test/gui test/regression-sentinel --ignore=test/parity-cross-backend/backend/test_metal_exit_seam_parity.py"

    runs-on: ${{ matrix.os }}
    name: E2E Slow (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - name: Cache CPM dependencies
        uses: actions/cache@v6
        with:
          path: cpm_cache
          key: cpm-${{ matrix.cache_key }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cpm-${{ matrix.cache_key }}-

      - name: Configure (shared library)
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TEST=OFF
          -DBUILD_GUI=OFF
          -DBUILD_SHARED_LIBS=ON
          -DLUMICE_NATIVE_ARCH=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install Pillow pytest numpy pytest-xdist

      - name: Run slow E2E tests
        # 'not heavy' drops redundant parity variants (prob05*, single-MS no-filter)
        # from the per-PR run; they stay available locally/nightly via `-m slow`.
        #
        # CLI-based Darwin slow gates (test_metal_throughput, test_metal_batch_invariance
        # exit-conservation) drive the `Lumice` CLI via runner.find_lumice_binary(), which
        # looks for build/cmake_install/Lumice or $LUMICE_BIN. This shared-lib build does
        # not install, so point LUMICE_BIN at the build-tree binary (its build-tree rpath
        # resolves liblumice; DYLD/LD_LIBRARY_PATH set as a belt-and-suspenders fallback).
        # No-op on legs where the binary is absent. (The parity leg uses the shared lib via
        # capi_runner and is unaffected; the Ubuntu leg has no CLI-based slow tests.)
        run: |
          cli="$(find build -type f -name Lumice 2>/dev/null | head -1)"
          if [ -n "$cli" ]; then export LUMICE_BIN="$cli"; fi
          lib="$(find build \( -name 'liblumice*.dylib' -o -name 'liblumice*.so' \) 2>/dev/null | head -1)"
          if [ -n "$lib" ]; then
            libdir="$(dirname "$lib")"
            export DYLD_LIBRARY_PATH="$libdir:${DYLD_LIBRARY_PATH:-}"
            export LD_LIBRARY_PATH="$libdir:${LD_LIBRARY_PATH:-}"
          fi
          # Phase 1 — parallel (pytest-xdist, -n 3). xdist runs each test in a
          # separate WORKER PROCESS, so capi_runner's process-global os.environ +
          # log callback stay per-process isolated (validated: the full slow suite
          # passes under -n 3, ~4min vs ~14min serial). The projection-parity
          # tests (the bulk of the macOS "rest" leg) dominate wall-time; this is
          # what keeps the leg under the step timeout. Throughput gates are
          # EXCLUDED here — they must not measure under concurrent GPU load.
          pytest ${{ matrix.pytest_args }} --ignore=test/performance -n 3 -v -m "slow and not heavy"
          # Phase 2 — serial + GPU-isolated: the throughput gates run alone so the
          # measured rate is not deflated by concurrent tests. Only legs whose args
          # include test/performance run this (the metal-exit-seam parity leg has
          # no perf tests → skipped). Cheap (~2 gates); no -n on purpose.
          case "${{ matrix.pytest_args }}" in
            *test/performance*) pytest test/performance -v -m "slow and not heavy" ;;
          esac
        timeout-minutes: 15

  benchmark-summary:
    if: always() && github.event_name == 'push'
    needs: [build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v7

      - name: Download benchmark artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: benchmark-*
          path: benchmarks

      - name: Generate summary
        run: |
          FMT_NUM() { echo "$1" | rev | sed 's/[0-9]\{3\}/&,/g' | rev | sed 's/^,//'; }

          echo "## CLI Benchmark Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | CPU | Cores | Workers | Single rps | Multi rps | Efficiency | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-----|-------|---------|------------|-----------|------------|--------|" >> "$GITHUB_STEP_SUMMARY"

          for f in benchmarks/benchmark-*/benchmark-result.txt; do
            if [ ! -f "$f" ]; then
              continue
            fi

            # Check for error (first line)
            FIRST_LINE=$(head -1 "$f")
            if echo "$FIRST_LINE" | jq -e '.error' > /dev/null 2>&1; then
              ERROR=$(echo "$FIRST_LINE" | jq -r '.error')
              echo "| (unknown) | - | - | - | - | - | - | CRASHED ($ERROR) |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            # Parse single and multi mode lines
            SINGLE_LINE=$(jq -c 'select(.mode == "single")' "$f" 2>/dev/null | head -1)
            MULTI_LINE=$(jq -c 'select(.mode == "multi")' "$f" 2>/dev/null | head -1)

            if [ -z "$SINGLE_LINE" ] && [ -z "$MULTI_LINE" ]; then
              echo "| (unknown) | - | - | - | - | - | - | N/A (parse error) |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            # Extract fields from whichever line is available
            REF_LINE="${MULTI_LINE:-$SINGLE_LINE}"
            PLATFORM=$(echo "$REF_LINE" | jq -r '.platform // "unknown"')
            CPU_MODEL=$(echo "$REF_LINE" | jq -r '.cpu_model // "-"' | cut -c1-35)
            CORES=$(echo "$REF_LINE" | jq -r '.cores // "-"')
            WORKERS=$(echo "$REF_LINE" | jq -r '.workers // "-"')

            SINGLE_RPS="-" ; MULTI_RPS="-" ; EFFICIENCY="-"
            if [ -n "$SINGLE_LINE" ]; then
              S_RPS=$(echo "$SINGLE_LINE" | jq -r '.rays_per_sec')
              SINGLE_RPS=$(FMT_NUM "$(printf '%.0f' "$S_RPS")")
            fi
            if [ -n "$MULTI_LINE" ]; then
              M_RPS=$(echo "$MULTI_LINE" | jq -r '.rays_per_sec')
              MULTI_RPS=$(FMT_NUM "$(printf '%.0f' "$M_RPS")")
            fi

            # Compute parallel efficiency: multi_rps / (single_rps × workers)
            if [ -n "$SINGLE_LINE" ] && [ -n "$MULTI_LINE" ]; then
              EFFICIENCY=$(awk "BEGIN {
                w = $(echo "$MULTI_LINE" | jq -r '.workers');
                if (w > 0 && $S_RPS > 0) printf \"%.0f%%\", ($M_RPS / ($S_RPS * w)) * 100;
                else print \"N/A\"
              }")
            fi

            echo "| $PLATFORM | $CPU_MODEL | $CORES | $WORKERS | $SINGLE_RPS | $MULTI_RPS | $EFFICIENCY | OK |" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Transform benchmark data
        run: |
          # benchmark-result.txt format:
          # - Normal: 2-line NDJSON (mode=single + mode=multi)
          # - Error:  1-line JSON with .error field
          #
          # Output: 3 JSON files (one per metric), each containing entries keyed by platform.
          # This produces 3 charts with 4 lines each instead of 12 single-line charts.
          > bench-single-entries.ndjson
          > bench-multi-entries.ndjson
          > bench-efficiency-entries.ndjson
          for f in benchmarks/benchmark-*/benchmark-result.txt; do
            [ ! -f "$f" ] && continue
            head -1 "$f" | jq -e '.error' > /dev/null 2>&1 && continue

            SINGLE=$(jq -c 'select(.mode == "single")' "$f" 2>/dev/null | head -1)
            MULTI=$(jq -c 'select(.mode == "multi")' "$f" 2>/dev/null | head -1)

            S_RPS="" ; M_RPS=""
            if [ -n "$SINGLE" ]; then
              PLATFORM=$(echo "$SINGLE" | jq -r '.platform')
              RPS=$(echo "$SINGLE" | jq -r '.rays_per_sec')
              if [ "$RPS" != "null" ] && [ -n "$RPS" ]; then
                S_RPS="$RPS"
                CPU=$(echo "$SINGLE" | jq -r '.cpu_model // ""')
                CORES=$(echo "$SINGLE" | jq -r '.cores // 0')
                jq -n --arg name "$PLATFORM" \
                      --arg unit "rays/sec" --argjson value "$RPS" \
                      --arg extra "CPU: ${CPU}\nCores: ${CORES}" \
                      '{name: $name, unit: $unit, value: $value, extra: $extra}' \
                  >> bench-single-entries.ndjson
              else
                echo "::warning::Skipping ${PLATFORM}/single: RPS is null"
              fi
            fi

            if [ -n "$MULTI" ]; then
              PLATFORM=$(echo "$MULTI" | jq -r '.platform')
              RPS=$(echo "$MULTI" | jq -r '.rays_per_sec')
              if [ "$RPS" != "null" ] && [ -n "$RPS" ]; then
                M_RPS="$RPS"
                CPU=$(echo "$MULTI" | jq -r '.cpu_model // ""')
                CORES=$(echo "$MULTI" | jq -r '.cores // 0')
                jq -n --arg name "$PLATFORM" \
                      --arg unit "rays/sec" --argjson value "$RPS" \
                      --arg extra "CPU: ${CPU}\nCores: ${CORES}" \
                      '{name: $name, unit: $unit, value: $value, extra: $extra}' \
                  >> bench-multi-entries.ndjson
              else
                echo "::warning::Skipping ${PLATFORM}/multi: RPS is null"
              fi
            fi

            # Efficiency: self-referential metric, immune to runner hardware changes
            if [ -n "$S_RPS" ] && [ -n "$M_RPS" ] && [ -n "$MULTI" ]; then
              WORKERS=$(echo "$MULTI" | jq -r '.workers')
              PLATFORM=$(echo "$MULTI" | jq -r '.platform')
              if [ "$WORKERS" != "0" ] && [ "$S_RPS" != "0" ]; then
                EFF=$(awk "BEGIN {printf \"%.1f\", ($M_RPS / ($S_RPS * $WORKERS)) * 100}")
                jq -n --arg name "$PLATFORM" \
                      --arg unit "%" --argjson value "$EFF" \
                      '{name: $name, unit: $unit, value: $value}' \
                  >> bench-efficiency-entries.ndjson
              fi
            fi
          done

          # Convert NDJSON to JSON arrays; remove empty files to prevent Store steps from running
          for suffix in single multi efficiency; do
            jq -s '.' "bench-${suffix}-entries.ndjson" > "bench-${suffix}.json"
            echo "bench-${suffix}.json entries: $(jq length "bench-${suffix}.json")"
            cat "bench-${suffix}.json"
            jq -e 'length > 0' "bench-${suffix}.json" > /dev/null 2>&1 || rm -f "bench-${suffix}.json"
          done

      - name: Store benchmark result (single-worker)
        if: github.ref == 'refs/heads/main' && hashFiles('bench-single.json') != ''
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "Single-worker Throughput"
          tool: customBiggerIsBetter
          output-file-path: bench-single.json
          benchmark-data-dir-path: bench
          gh-pages-branch: gh-pages
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "200%"
          comment-on-alert: true
          summary-always: true
          max-items-in-chart: 100

      - name: Store benchmark result (multi-worker)
        if: github.ref == 'refs/heads/main' && hashFiles('bench-multi.json') != ''
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "Multi-worker Throughput"
          tool: customBiggerIsBetter
          output-file-path: bench-multi.json
          benchmark-data-dir-path: bench
          gh-pages-branch: gh-pages
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "200%"
          comment-on-alert: true
          summary-always: true
          max-items-in-chart: 100

      - name: Store benchmark result (efficiency)
        if: github.ref == 'refs/heads/main' && hashFiles('bench-efficiency.json') != ''
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "Parallel Efficiency"
          tool: customBiggerIsBetter
          output-file-path: bench-efficiency.json
          benchmark-data-dir-path: bench
          gh-pages-branch: gh-pages
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "200%"
          comment-on-alert: true
          summary-always: true
          max-items-in-chart: 100

  format-check:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Check clang-format
        run: |
          find src test bench -name '*.cpp' -o -name '*.hpp' -o -name '*.h' -o -name '*.cc' -o -name '*.inl' | \
            xargs clang-format --dry-run --Werror 2>&1

  # Engineering-policy gate (separate from format-check above): env-knob
  # centralization + registration, GUI/core API boundary, no `using namespace`.
  # Version-independent — the executable half of doc/env-var-policy.md + AGENTS.md.
  policy:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Policy checks (env knobs / API boundary / using-namespace)
        run: python3 scripts/check_policies.py
