name: Release

on:
  push:
    tags: ['v*']

env:
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_cache

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-24.04
            build_gui: ON
            artifact_ext: tar.gz

          - name: linux-arm64
            os: ubuntu-24.04-arm
            build_gui: OFF
            artifact_ext: tar.gz

          - name: macos-arm64
            os: macos-15
            build_gui: ON
            artifact_ext: tar.gz

          - name: windows-x64
            os: windows-2025
            build_gui: OFF
            artifact_ext: zip

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux' && matrix.build_gui == 'ON'
        run: >
          sudo apt-get update && sudo apt-get install -y
          libgl-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev
          libgtk-3-dev

      - name: Cache CPM dependencies
        uses: actions/cache@v4
        with:
          path: cpm_cache
          key: cpm-${{ matrix.name }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cpm-${{ matrix.name }}-

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
          -DBUILD_SHARED_LIBS=ON
          -DBUILD_TEST=OFF
          -DBUILD_GUI=${{ matrix.build_gui }}
          -DLUMICE_NATIVE_ARCH=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd install
          tar czf ${{ github.workspace }}/lumice-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.artifact_ext }} *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd install
          Compress-Archive -Path * -DestinationPath ${{ github.workspace }}/lumice-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.artifact_ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumice-${{ matrix.name }}
          path: lumice-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.artifact_ext }}

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: lumice-*
