name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_cache

  # Platform support decisions (2026-03):
  #   - Only CLI and GUI executables are published; shared library publishing is deferred.
  #   - linux-arm64: GUI OFF — ARM runner GPU/display support not verified.
  #   - macOS Intel: excluded — GitHub Actions dropped macos-13 runners (2025).

jobs:
  # Compute version string once, used by all jobs
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_release: ${{ steps.ver.outputs.is_release }}
    steps:
      - uses: actions/checkout@v7
      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)
            BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
            echo "version=dev-${BRANCH}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Version check (tag releases only)
        if: github.event_name == 'push'
        run: python scripts/version.py check --tag "${{ github.ref_name }}"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-24.04
            build_gui: ON
            ext: tar.gz

          - name: linux-arm64
            os: ubuntu-24.04-arm
            build_gui: OFF  # ARM runner GPU/display support not verified
            ext: tar.gz

          - name: macos-arm64
            os: macos-15
            build_gui: ON
            ext: tar.gz

          # windows-2022 (NOT windows-2025) on purpose: windows-2025 ships only
          # VS 2026 (MSVC 14.51), which every current CUDA release rejects
          # (CUDA host_config.h: VS 2017-2022 only). windows-2022 ships VS 2022,
          # so the CUDA-enabled release artifact must build there. See the
          # windows-cuda-compile job in ci.yml for the full rationale.
          - name: windows-x64
            os: windows-2022
            build_gui: ON
            ext: zip
            msvc: true
            cuda: ON  # ship a CUDA-enabled Windows artifact (multi-arch fatbin)

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-tags: true
          lfs: ${{ matrix.build_gui == 'ON' }}  # GUI builds need LFS for icon resources

      # MSVC: set up Visual Studio environment before configure/build
      - name: Set up MSVC
        if: matrix.msvc
        uses: ilammy/msvc-dev-cmd@v1

      # GLAD2 runs the Python code generator at CMake configure time (needs Jinja2).
      - name: Install GLAD2 Python dependencies
        if: matrix.msvc && matrix.build_gui == 'ON'
        shell: pwsh
        run: |
          python -m pip install jinja2
          $pythonDir = Split-Path (Get-Command python).Source
          echo "LUMICE_PYTHON_ARGS=-DPython_EXECUTABLE=$(Get-Command python | Select-Object -ExpandProperty Source)" >> $env:GITHUB_ENV

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux' && matrix.build_gui == 'ON'
        run: >
          sudo apt-get update && sudo apt-get install -y
          libgl-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev
          libgtk-3-dev

      # CUDA toolkit for the CUDA-enabled Windows artifact (nvcc + cudart).
      # Pinned to 12.6.3 to match ci.yml's windows-cuda-compile gate; supports
      # the windows-2022 VS 2022 host compiler and emits the full multi-arch
      # fatbin (compute_61 PTX + sm_75/86/89 SASS, see CMakeLists.txt).
      - name: Install CUDA toolkit (Windows CUDA artifact)
        if: matrix.cuda == 'ON'
        uses: Jimver/cuda-toolkit@v0.2.23
        with:
          cuda: '12.6.3'
          method: 'network'
          sub-packages: '["nvcc", "cudart"]'

      - name: Cache CPM dependencies
        uses: actions/cache@v5
        with:
          path: cpm_cache
          key: cpm-${{ matrix.name }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cpm-${{ matrix.name }}-

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
          -DBUILD_TEST=OFF
          -DBUILD_GUI=${{ matrix.build_gui }}
          -DLUMICE_NATIVE_ARCH=OFF
          -DLUMICE_CUDA_ENABLED=${{ matrix.cuda || 'OFF' }}
          ${{ env.LUMICE_PYTHON_ARGS }}

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build

      # Bundle the dynamic CUDA runtime next to the executables so the CUDA
      # backend loads on a user machine that has an NVIDIA driver but no CUDA
      # Toolkit installed. cudart is dynamically linked (CUDA::cudart); the
      # NVIDIA display driver provides libcuda/nvcuda.dll separately.
      - name: Bundle CUDA runtime DLL (Windows CUDA artifact)
        if: runner.os == 'Windows' && matrix.cuda == 'ON'
        shell: pwsh
        run: |
          $dll = Get-ChildItem "$env:CUDA_PATH\bin\cudart64_*.dll" | Select-Object -First 1
          if (-not $dll) { throw "cudart64 DLL not found under $env:CUDA_PATH\bin" }
          Write-Host "Bundling CUDA runtime: $($dll.FullName)"
          Copy-Item $dll.FullName -Destination install/
          Write-Host "install/ contents:"
          Get-ChildItem install/ | Select-Object Name, Length

      # macOS code signing + notarization (Developer ID Application certificate).
      # Runs only on macOS and only when signing secrets are configured.
      - name: Import Apple certificate
        if: runner.os == 'macOS' && env.P12_BASE64 != ''
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          # Prepend build keychain to search list (preserve existing keychains)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Sign and notarize macOS binaries
        if: runner.os == 'macOS' && env.APPLE_TEAM_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          IDENTITY="Developer ID Application: Jiajie Zhang ($APPLE_TEAM_ID)"

          # Sign CLI binary and .app bundle (no --deep: single binary, no nested frameworks)
          codesign --sign "$IDENTITY" --options runtime --force --timestamp install/Lumice
          codesign --sign "$IDENTITY" --options runtime --force --timestamp install/LumiceGUI.app

          # Verify signatures
          codesign --verify --strict install/Lumice
          codesign --verify --strict install/LumiceGUI.app

          # Package both binaries for notarization (single submission covers all)
          ditto -c -k --keepParent install/LumiceGUI.app /tmp/notarize-gui.zip
          ditto -c -k install/Lumice /tmp/notarize-cli.zip

          # Submit for notarization and wait (timeout 15 min)
          xcrun notarytool submit /tmp/notarize-gui.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait --timeout 15m
          xcrun notarytool submit /tmp/notarize-cli.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait --timeout 15m

          # Staple ticket to .app (CLI cannot be stapled but ticket exists server-side)
          xcrun stapler staple install/LumiceGUI.app

          # Final verification
          spctl --assess --verbose --type exec install/LumiceGUI.app

      - name: Cleanup Apple certificate
        if: runner.os == 'macOS' && always()
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain-db 2>/dev/null || true
          rm -f $RUNNER_TEMP/certificate.p12

      - name: Package
        if: runner.os != 'Windows'
        run: |
          cd install
          tar czf ${{ github.workspace }}/lumice-${{ needs.prepare.outputs.version }}-${{ matrix.name }}.tar.gz *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd install
          Compress-Archive -Path * -DestinationPath ${{ github.workspace }}/lumice-${{ needs.prepare.outputs.version }}-${{ matrix.name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: lumice-${{ matrix.name }}
          path: lumice-${{ needs.prepare.outputs.version }}-${{ matrix.name }}.${{ matrix.ext }}
          retention-days: ${{ needs.prepare.outputs.is_release == 'true' && 90 || 7 }}

  release:
    needs: [prepare, build]
    if: needs.prepare.outputs.is_release == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: lumice-*
